# Render one-click deploy for PrepAI Backend
# Use at: https://dashboard.render.com/select-repo?type=blueprint
services:
  - type: web
    name: prepai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHON_VERSION
        value: 3.11.0
